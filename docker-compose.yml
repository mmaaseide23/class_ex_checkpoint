services:
  db:
    image: postgres:17
    container_name: realestate-db
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./02-load-csv.sh:/docker-entrypoint-initdb.d/02-load-csv.sh
      - ./03-seed-data.sql:/docker-entrypoint-initdb.d/03-seed-data.sql
      - ./data:/data:ro

volumes:
  pgdata:
